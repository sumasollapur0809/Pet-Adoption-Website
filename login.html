<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Furry Friend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
      <div class="auth-header">
    <img src="pet-adoption-center.png" alt="Furry Friend Logo" class="auth-logo">
  </div>

  <div class="login">
    <h1>Login to your Furry Friend account 😀</h1>
    <form>
      <label>Username:</label>
      <input type="text" placeholder="Enter your username">

      <label>Password:</label>
      <input type="password" placeholder="Enter your password ⌨️">
    </form>

    <a class="btn" href="home.html">Login</a>

    <p>Don't have an account? No problem 😊</p>
    <a class="btn" href="signup.html">Sign Up</a>
  </div>

</body>
</html>
