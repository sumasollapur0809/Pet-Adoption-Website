<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Furry Friend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin(); showPopup()">
      <div class="auth-header">
    <img src="assets/pet-adoption-center.png" alt="Furry Friend Logo" class="auth-logo">
  </div>

  <div class="login">
    <h1>Login to your Furry Friend account 😀</h1>
    <form onsubmit="return loginUser()">
  <label>Username:</label>
  <input type="text" id="username" placeholder="Enter your username">

  <label>Password:</label>
  <input type="password" id="password" placeholder="Enter your password ⌨️">

  <button type="submit" class="btn">Login</button>
</form>
   
<p>Don't have an account? No problem 😊</p>
    <button class="btn"><a  href="signup.html">Sign Up</a></button>
  </div>
  <div id="pop-up" class="pop-up-message">you have logged in successfully🥳</div>
<script src="script.js"></script>
</body>
</html>
