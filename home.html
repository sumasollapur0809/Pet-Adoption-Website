<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Furry Friend</title>
    <style>
         body{
            margin: 0%;
            padding: 0%;
            background-color: rgb(255, 184, 255);
            font-family: cursive;

        }
.main-box {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
    border: 1px;
    border-radius: 10px;
    background-color: rgb(244, 125, 192);
    
}

.pet-box {
    width: 300px;
    height: 650px;
    border: 1px solid #ccc;
    padding: 15px;
    text-align: center;
    background-color: palevioletred;
    border: 1px;
    border-radius: 10px;
}

.pet-box img {
    width: 100%;
    height: auto;
}
a{
    border: 1px;
    background-color: rgb(250, 140, 250);
    border-radius: 10px;
}
    </style>
</head>
<body>
    <h1>Welcome! to Your Furry Friend</h1>
<div class="main-box">

    <div class="pet-box">
        <img src="pic1.jpg">
        <div class="info-box">
            <p>Name: Buddy</p>
            <p>Age: 3 years</p>
            <p>Rescued from a harsh environment</p>
            <p>Adoption fee: $100</p>
            <a href="#">Adopt Now</a>
        </div>
    </div>

    <div class="pet-box">
        <img src="pic2.jpg">
        <div class="info-box">
            <p>Name: Milo</p>
            <p>Age: 2 years</p>
            <p>Rescued from the streets</p>
            <p>Adoption fee: $90</p>
            <a href="#">Adopt Now</a>
        </div>
    </div>

    <div class="pet-box">
        <img src="pic3.jpg">
        <div class="info-box">
            <p>Name: Lucy</p>
            <p>Age: 2.5 years</p>
            <p>Rescued from a harsh owner</p>
            <p>Adoption fee: $95</p>
            <a href="#">Adopt Now</a>
        </div>
    </div>

</div>
</body>
</html>
